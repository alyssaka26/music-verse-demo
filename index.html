<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#05020d" />
    <title>Music Verse — 360° Music Discovery</title>
    <script type="module" crossorigin src="/music-verse-demo/assets/index-D-f52umm.js"></script>
    <link rel="stylesheet" crossorigin href="/music-verse-demo/assets/index-CYs2VT7I.css">
  </head>
  <body>
    <div id="app">
      <canvas id="glitter" aria-hidden="true"></canvas>
      <canvas id="world" aria-label="360 degree music space"></canvas>

      <div class="grain"></div>
      <div class="vignette"></div>
      <div class="warp" id="warp"></div>

      <header class="topbar">
        <button class="glass-button back-button" id="backButton" aria-label="返回上一个世界" disabled>
          <span>←</span>
        </button>
        <div class="brand">
          <span class="brand-dot"></span>
          <span>MUSIC VERSE</span>
        </div>
        <button class="glass-button motion-button" id="motionButton" aria-label="开启体感控制">
          <span class="motion-icon">◉</span>
          <span class="motion-label">体感</span>
        </button>
      </header>

      <div class="journey" id="journey">世界 01｜流派：Hip-Hop/Rap｜年代：2020s</div>

      <div class="target-copy" id="targetCopy">
        <span class="target-kicker" id="targetKicker">相关歌曲</span>
        <strong id="targetTitle">环顾四周</strong>
        <span id="targetArtist">将准星停留在封面上进入</span>
      </div>

      <div class="reticle" id="reticle" aria-hidden="true">
        <svg viewBox="0 0 72 72">
          <circle class="reticle-track" cx="36" cy="36" r="29"></circle>
          <circle class="reticle-progress" cx="36" cy="36" r="29"></circle>
        </svg>
        <span class="reticle-core"></span>
      </div>

      <section class="now-playing" id="nowPlaying">
        <div class="cover-mini-wrap">
          <img id="nowCover" src="./covers/01-skate.jpg" alt="Current album cover" />
          <span class="playing-bars"><i></i><i></i><i></i></span>
        </div>
        <div class="track-copy">
          <span class="eyebrow">当前世界</span>
          <strong id="nowTitle">Stir</strong>
          <span id="nowArtist">Rylo Rodriguez</span>
        </div>
        <button class="pause-button" id="pauseButton" aria-label="播放试听">▶</button>
      </section>

      <div class="hint" id="hint">拖动探索 · 将准星停留在封面上进入新世界</div>

    </div>
  </body>
</html>
